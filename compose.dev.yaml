# compose.dev.yaml
# ========================================
# EarningsWatch 開発用Compose定義
# ========================================

name: earningswatch-dev

services:
  db:
    container_name: earningswatch_db_dev

    # envファイルの指定
    env_file: config/.env.dev

    environment:
      # dev用DB名に上書き
      POSTGRES_DB: earningswatch_dev
      # POSTGRES_PASSWORDは.env.devのPOSTGRES_PASSWORDが使われる

      # healthcheckコマンドの上書き(DB名変更)
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U earningswatch -d earningswatch_dev" ]

    volumes:
      # devはバックアップ処置などを取らないため
      # バインドではなく名前付きvolume
      - postgres_data_dev:/var/lib/postgresql/data

  backend:
    container_name: earningswatch_backend_dev

    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev

    working_dir: /workspace/backend
    tty: true

    command:
      - cargo
      - watch
      - -x
      - check

    # envファイルの指定
    env_file: config/.env.dev

    # 環境変数の設定
    environment:
      # 実行環境ラベル(configのロードに使用)
      EARNINGSWATCH_ENV: dev
      # 設定ファイルのパス
      EARNINGSWATCH_CONFIG_DIR: /workspace/config

    volumes:
      # リポジトリ全体を見られるようにする。
      - .:/workspace

      # 設定ファイルをvolumeにマウント(読み取り専用)
      - ./config/config.dev.toml:/workspace/config/config.dev.toml:ro

      # Rustの依存キャッシュ。毎回ダウンロードし直さないための名前付きvolume。
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git

      # targetは容量が大きいため名前付きvolumeに逃がす。
      - backend_target:/workspace/backend/target

    # 127でホスト外からは見えない
    ports:
      # 8080は使用済みなので8090に変更
      - "127.0.0.1:8090:8080"

    depends_on:
      db:
        condition: service_healthy

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    container_name: earningswatch_frontend_dev

    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev

    working_dir: /workspace/frontend
    tty: true

    volumes:
      - .:/workspace
      # ボリュームに逃がす
      - ./frontend/node_modules:/workspace/frontend/node_modules

    ports:
      - "5173:5173"

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  cargo_registry:
  cargo_git:
  backend_target:
  postgres_data_dev:
