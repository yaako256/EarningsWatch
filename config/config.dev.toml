# config/config.dev.toml
# 開発用の設定ファイル


[server]
host = "0.0.0.0"
port = 8090

[database]
# envで上書き
url = "postgres-url"

[jwt]
# envで上書き
secret = "CHANGE_ME"

access_token_ttl_minutes = 15
refresh_token_ttl_days = 30

[cookie]
secure = false

[security]
webhook_enc_key = "CHANGE_ME_BASE64_32BYTES"

[logging]
server_flush_window_seconds = 60

[scraping]
recent_fingerprint_limit = 100

[notifier]
default_embed_color = "0x87CEEB"

[import]
ticker_max_len = 20
company_name_max_len = 50
notes_max_len = 500

[dashboard]
recent_sent_days = 5
recent_sent_min_count = 10
recent_failed_days = 5
recent_failed_min_count = 5
admin_recent_runs_count = 30

[retry]
monitor_health_check_retries = 3
monitor_health_check_interval_seconds = 120
send_retry_count = 3
send_retry_interval_seconds = 30