# compose.yaml
# ========================================
# EarningsWatch 共通Compose定義
# ========================================

name: earningswatch

services:
  db:
    image: postgres:16-bookworm
    container_name: earningswatch_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: earningswatch

      # POSTGRESパスワードは.env指定
      # 初期値は記入せず、dev/prodで上書きする
      # → それにしようと思ったが、.env上書きよりenvironmentが強かったため、コメントアウト
      #POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}

      # DB名は後でdev/prodで上書きする
      # このデフォルト値では起動しない想定
      POSTGRES_DB: earningswatch

      TZ: Asia/Tokyo

    healthcheck:
      # DB名を  dev/prodで上書きする
      test: [ "CMD-SHELL", "pg_isready -U earningswatch" ]
      interval: 10s
      timeout: 5s
      retries: 5

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
